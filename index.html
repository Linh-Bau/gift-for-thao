<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #667eea;
            --primary-purple-dark: #764ba2;
            --accent-red: #ff6b6b;
            --white: #ffffff;
            --white-alpha-30: rgba(255, 255, 255, 0.3);
            --white-alpha-80: rgba(255, 255, 255, 0.8);
            --black-alpha-20: rgba(0, 0, 0, 0.2);
            --black-alpha-30: rgba(0, 0, 0, 0.3);

            --border-radius-sm: 8px;
            --border-radius-md: 15px;

            --transition-fast: 0.3s ease;
            --transition-normal: 0.5s ease;
            --transition-slow: 0.6s cubic-bezier(0.35, 0, 0.25, 1);

            --shadow-sm: 0 4px 15px var(--black-alpha-20);
            --shadow-md: 0 6px 20px var(--black-alpha-30);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        .app {
            height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary-purple) 0%, var(--primary-purple-dark) 100%);
            font-family: 'Arial', sans-serif;
        }

        .no-display {
            display: none;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .fade-out {
            animation: fadeOut 1s forwards;
        }

        /* tấm màn che */
        .rocket-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100vw;
            height: 100vh;
        }

        .rocket-item {
            font-size: 96px;
        }

        @keyframes rocketLaunch {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-150vh);
                opacity: 0;
            }
        }

        .rocket-item.launch {
            animation: rocketLaunch 2s ease-in forwards;
        }

        /* Cube */
        .cube-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container-3d {
            perspective: 1000px;
            width: clamp(150px, 60vw, 300px);
            height: clamp(150px, 60vw, 300px);
            position: relative;
            z-index: 1;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.5em, 4vw, 2.5em);
            font-weight: bold;
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.5);
            opacity: 0.9;
            flex-direction: column;
            gap: clamp(10px, 3vw, 20px);
        }

        .cube-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Các mặt của hộp */
        .face-1 {
            background: linear-gradient(135deg, #FF6B6B, #FF8E72);
            transform: rotateY(0deg) translateZ(calc(clamp(100px, 30vw, 150px)));
        }

        .face-2 {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            transform: rotateY(90deg) translateZ(calc(clamp(100px, 30vw, 150px)));
        }

        .face-3 {
            background: linear-gradient(135deg, #F39C12, #E74C3C);
            transform: rotateY(180deg) translateZ(calc(clamp(100px, 30vw, 150px)));
        }

        .face-4 {
            background: linear-gradient(135deg, #9B59B6, #8E44AD);
            transform: rotateY(270deg) translateZ(calc(clamp(100px, 30vw, 150px)));
        }

        .face-5 {
            background: linear-gradient(135deg, #3498DB, #2980B9);
            transform: rotateX(90deg) translateZ(calc(clamp(100px, 30vw, 150px)));
        }

        .face-6 {
            background: linear-gradient(135deg, #2ECC71, #27AE60);
            transform: rotateX(-90deg) translateZ(calc(clamp(100px, 30vw, 150px)));
        }

        @keyframes rotateAuto {
            0% {
                transform: rotateX(0deg) rotateY(0deg);
            }

            100% {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }

        @keyframes flyOut1 {
            0% {
                transform: rotateY(0deg) translateZ(calc(clamp(100px, 30vw, 150px)));
                opacity: 1;
            }

            100% {
                transform: rotateY(0deg) translateZ(clamp(250px, 70vw, 400px)) rotateX(45deg) rotateY(-30deg);
                opacity: 0.7;
            }
        }

        @keyframes flyOut2 {
            0% {
                transform: rotateY(90deg) translateZ(calc(clamp(100px, 30vw, 150px)));
                opacity: 1;
            }

            100% {
                transform: rotateY(90deg) translateZ(clamp(250px, 70vw, 400px)) rotateX(-45deg) rotateY(30deg);
                opacity: 0.7;
            }
        }

        @keyframes flyOut3 {
            0% {
                transform: rotateY(180deg) translateZ(calc(clamp(100px, 30vw, 150px)));
                opacity: 1;
            }

            100% {
                transform: rotateY(180deg) translateZ(clamp(250px, 70vw, 400px)) rotateX(30deg) rotateY(45deg);
                opacity: 0.7;
            }
        }

        @keyframes flyOut4 {
            0% {
                transform: rotateY(270deg) translateZ(calc(clamp(100px, 30vw, 150px)));
                opacity: 1;
            }

            100% {
                transform: rotateY(270deg) translateZ(clamp(250px, 70vw, 400px)) rotateX(-30deg) rotateY(-45deg);
                opacity: 0.7;
            }
        }

        @keyframes flyOut5 {
            0% {
                transform: rotateX(90deg) translateZ(calc(clamp(100px, 30vw, 150px)));
                opacity: 1;
            }

            100% {
                transform: rotateX(90deg) translateZ(clamp(250px, 70vw, 400px)) rotateY(45deg) rotateZ(30deg);
                opacity: 0.7;
            }
        }

        @keyframes flyOut6 {
            0% {
                transform: rotateX(-90deg) translateZ(calc(clamp(100px, 30vw, 150px)));
                opacity: 1;
            }

            100% {
                transform: rotateX(-90deg) translateZ(clamp(250px, 70vw, 400px)) rotateY(-45deg) rotateZ(-30deg);
                opacity: 0.7;
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .cube.cube-explode .face-1 {
            animation: flyOut1 0.8s ease-out forwards;
        }

        .cube.cube-explode .face-2 {
            animation: flyOut2 0.8s ease-out forwards;
        }

        .cube.cube-explode .face-3 {
            animation: flyOut3 0.8s ease-out forwards;
        }

        .cube.cube-explode .face-4 {
            animation: flyOut4 0.8s ease-out forwards;
        }

        .cube.cube-explode .face-5 {
            animation: flyOut5 0.8s ease-out forwards;
        }

        .cube.cube-explode .face-6 {
            animation: flyOut6 0.8s ease-out forwards;
        }

        .cube-rotate {
            animation: rotateAuto 20s linear infinite;
        }

        .cube-explode {
            animation: none !important;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="cube-container">
            <div class="container-3d">
                <div class="cube cube-rotate">
                    <div class="cube-face face-1">
                        <img src="asserts/step_1/img_1.png" alt="Mặt 1" loading="lazy">
                    </div>
                    <div class="cube-face face-2">
                        <img src="asserts/step_1/img_1.png" alt="Mặt 2" loading="lazy">
                    </div>
                    <div class="cube-face face-3">
                        <img src="asserts/step_1/img_1.png" alt="Mặt 3" loading="lazy">
                    </div>
                    <div class="cube-face face-4">
                        <img src="asserts/step_1/img_1.png" alt="Mặt 4" loading="lazy">
                    </div>
                    <div class="cube-face face-5">
                        <img src="asserts/step_1/img_1.png" alt="Mặt 5" loading="lazy">
                    </div>
                    <div class="cube-face face-6">
                        <img src="asserts/step_1/img_1.png" alt="Mặt 6" loading="lazy">
                    </div>
                </div>
            </div>
        </div>

        

        <div class="rocket-container no-display">
            <i class="rocket-item bi bi-rocket-fill"></i>
        </div>
    </div>

    <script>
        // app
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // cube logic
        const cube = document.querySelector('.cube');
        const cubeContainer = document.querySelector('#cube-container');

        cube.addEventListener('click', async () => {
            cube.classList.remove('cube-rotate');
            cube.classList.add('cube-explode');
            await sleep(2000);
            cubeContainer.classList.add('fade-out');
            await sleep(2000);
        });
    </script>
</body>

</html>
