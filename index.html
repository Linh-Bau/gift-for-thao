<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp 3D Xoay - 6 Mặt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Hộp 3D Xoay - 6 Mặt</h1>
    
    <div class="container">
        <div class="cube" id="cube" onclick="explodeAndRecover()">
            <div class="cube-face face-1">
                <img src="asserts/step_1/img_1.png" alt="Mặt 1">
            </div>
            <div class="cube-face face-2">
                <img src="asserts/step_1/img_1.png" alt="Mặt 2">
            </div>
            <div class="cube-face face-3">
                <img src="asserts/step_1/img_1.png" alt="Mặt 3">
            </div>
            <div class="cube-face face-4">
                <img src="asserts/step_1/img_1.png" alt="Mặt 4">
            </div>
            <div class="cube-face face-5">
                <img src="asserts/step_1/img_1.png" alt="Mặt 5">
            </div>
            <div class="cube-face face-6">
                <img src="asserts/step_1/img_1.png" alt="Mặt 6">
            </div>
        </div>
    </div>

    <!-- Coverflow Gallery -->
    <div class="coverflow-container" id="coverflowContainer">
        <div class="coverflow-close" onclick="closeCoverflow()">
            <i class="bi bi-x-circle-fill"></i>
        </div>
        <div class="coverflow-wrapper">
            <div class="coverflow" id="coverflow">
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 1</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 1">
                    <div class="coverflow-description">Mô tả ảnh 1</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 2</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 2">
                    <div class="coverflow-description">Mô tả ảnh 2</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 3</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 3">
                    <div class="coverflow-description">Mô tả ảnh 3</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 4</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 4">
                    <div class="coverflow-description">Mô tả ảnh 4</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 5</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 5">
                    <div class="coverflow-description">Mô tả ảnh 5</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 6</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 6">
                    <div class="coverflow-description">Mô tả ảnh 6</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 7</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 7">
                    <div class="coverflow-description">Mô tả ảnh 7</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 8</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 8">
                    <div class="coverflow-description">Mô tả ảnh 8</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 9</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 9">
                    <div class="coverflow-description">Mô tả ảnh 9</div>
                </div>
                <div class="coverflow-item">
                    <div class="coverflow-title">Tiêu đề 10</div>
                    <img src="asserts/step_2/img_1.png" alt="Image 10">
                    <div class="coverflow-description">Mô tả ảnh 10</div>
                </div>
            </div>
        </div>
        <div class="coverflow-progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="curtain" id="curtain" aria-hidden="true"></div>
    <div class="rocket" id="rocket" aria-hidden="true">
        <i class="bi bi-rocket-fill"></i>
    </div>

    <script src="script.js"></script>
</body>
</html>
